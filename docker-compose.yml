version: "3.9"

# Local development stack — PostgreSQL + API service
# Usage: docker compose up --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: enterprise
      POSTGRES_USER: enterprise
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enterprise"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./services/api-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://enterprise:devpassword@postgres:5432/enterprise
      SECRET_KEY: local-dev-secret-key-change-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      SQS_QUEUE_URL: ""
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4317"
      UVICORN_WORKERS: "1"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
