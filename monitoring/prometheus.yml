global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'ecs-fargate'
    sample_limit: 1000
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8080'] # Assuming the app sidecar or main container exposes metrics

  - job_name: 'cloudwatch-exporter'
    static_configs:
      - targets: ['cloudwatch-exporter:9106']
